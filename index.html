<!-- ============ 8. ORDER FORM ============ -->
<section class="section order" id="order">
  <div class="container">
    <h2 class="section-title">أكمل طلبك الآن</h2>
    <p class="section-sub">املأ المعلومات وسنتصل بك لتأكيد الطلب</p>

    <div class="delivery-free">
      🚚 التوصيل مجاني إلى جميع الولايات
    </div>

    <form id="orderForm" class="order-form" novalidate>

      <div class="field">
        <label for="fullName">الاسم الكامل</label>
        <input 
          type="text" 
          id="fullName" 
          name="fullName" 
          placeholder="الاسم الكامل" 
          required>
        <span class="error-msg" id="err-fullName"></span>
      </div>


      <div class="field">
        <label for="phone">رقم الهاتف</label>
        <input 
          type="tel" 
          id="phone" 
          name="phone" 
          placeholder="رقم الهاتف" 
          required>
        <span class="error-msg" id="err-phone"></span>
      </div>


      <div class="field">
        <label for="wilaya">الولاية</label>
        <input 
          type="text" 
          id="wilaya" 
          name="wilaya" 
          placeholder="الولاية" 
          required>
        <span class="error-msg" id="err-wilaya"></span>
      </div>


      <div class="field">
        <label for="commune">البلدية</label>
        <input 
          type="text" 
          id="commune" 
          name="commune" 
          placeholder="البلدية">
        <span class="error-msg" id="err-commune"></span>
      </div>


      <div class="field">
        <label for="address">العنوان الكامل</label>
        <textarea 
          id="address" 
          name="address" 
          rows="2" 
          placeholder="العنوان الكامل"
          required></textarea>
        <span class="error-msg" id="err-address"></span>
      </div>


      <button type="submit" class="btn btn-primary btn-lg btn-block" id="submitBtn">
        <span class="btn-text">
          تأكيد الطلب — 2700 دج
        </span>
        <span class="btn-loader" aria-hidden="true"></span>
      </button>


      <div class="form-feedback" id="formFeedback" role="status" aria-live="polite"></div>

    </form>
  </div>
</section>
